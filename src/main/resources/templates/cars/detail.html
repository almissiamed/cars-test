<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Détail - CarSales</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">CarSales</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/cars">Voir les voitures</a></li>
                <li class="nav-item"><a class="nav-link" href="/cars/new">Ajouter une voiture</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="card">
        <div class="card-header">
            <h2 th:text="${car.brand + ' ' + car.model}">Marque Modèle</h2>
        </div>
        <div class="card-body">
            <p><strong>Année:</strong> <span th:text="${car.year}">2024</span></p>
            <p><strong>Prix:</strong> <span th:text="${#numbers.formatDecimal(car.price, 0, 'COMMA', 2, 'POINT')}">0.00</span> €</p>
            <p><strong>Couleur:</strong> <span th:text="${car.color}">Noir</span></p>
            <p><strong>Kilométrage:</strong> <span th:text="${#numbers.formatInteger(car.mileage, 3, 'DEFAULT')}">0</span> km</p>
            <p><strong>Description:</strong></p>
            <p th:text="${car.description}">Description ici</p>
        </div>
        <div class="card-footer">
            <a href="/cars" class="btn btn-secondary">Retour</a>
            <a th:href="@{/cars/{id}/edit(id=${car.id})}" class="btn btn-warning">Modifier</a>
            <a th:href="@{/cars/{id}/delete(id=${car.id})}" class="btn btn-danger">Supprimer</a>
        </div>
    </div>
</div>
</body>
</html>
