<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Liste des voitures - CarSales</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">CarSales</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/cars">Voir les voitures</a></li>
                <li class="nav-item"><a class="nav-link" href="/cars/new">Ajouter une voiture</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h1>Nos voitures</h1>
    <a href="/cars/new" class="btn btn-success mb-3">+ Ajouter une voiture</a>

    <div class="row">
        <div th:each="car : ${cars}" class="col-md-4 mb-4">
            <div class="card">
                <div class="card-body">
                    <h5 class="card-title" th:text="${car.brand + ' ' + car.model}">Marque Modèle</h5>
                    <p class="card-text">
                        Année: <span th:text="${car.year}">2024</span><br>
                        Prix: <span th:text="${#numbers.formatDecimal(car.price, 0, 'COMMA', 2, 'POINT')}">0.00</span> €<br>
                        Couleur: <span th:text="${car.color}">Noir</span><br>
                        Kilométrage: <span th:text="${#numbers.formatInteger(car.mileage, 3, 'DEFAULT')}">0</span> km
                    </p>
                    <a th:href="@{/cars/{id}(id=${car.id})}" class="btn btn-primary">Détails</a>
                    <a th:href="@{/cars/{id}/edit(id=${car.id})}" class="btn btn-warning">Modifier</a>
                    <a th:href="@{/cars/{id}/delete(id=${car.id})}" class="btn btn-danger" onclick="return confirm('Supprimer cette voiture ?')">Supprimer</a>
                </div>
            </div>
        </div>
    </div>

    <div th:if="${#lists.isEmpty(cars)}" class="alert alert-info">
        Aucune voiture disponible pour le moment.
    </div>
</div>
</body>
</html>
